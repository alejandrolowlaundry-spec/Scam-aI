services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: fraud-detection-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DEMO_MODE
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: fraud-detection-db
          property: connectionString
      - key: HUBSPOT_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false
      - key: ALERT_TO_PHONE
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # set to your Render frontend URL after deploy

  # ── Frontend Dashboard ───────────────────────────────────────────────────────
  - type: web
    name: fraud-detection-dashboard
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        fromService:
          name: fraud-detection-api
          type: web
          property: host

databases:
  - name: fraud-detection-db
    databaseName: fraud_detection
    user: fraud_agent
    plan: free
